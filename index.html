<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#17172a" />
  <title>500일 꿈속 호텔</title>
  <link rel="stylesheet" href="style.css?v=37" />
  <link rel="stylesheet" href="gym_scenario.css?v=3" />
</head>
<body>
  <main id="app">
    <canvas id="game" width="384" height="672" aria-label="500일 꿈속 호텔 픽셀 게임"></canvas>
    <div id="ui">
      <button id="startButton" class="pixel-button">호텔 들어가기</button>
      <button id="pocketButton" class="pocket-button hidden" aria-label="가방 열기"></button>
      <button id="actionButton" class="action-button hidden" aria-label="상호작용하기"></button>
      <section id="inventoryPanel" class="inventory-panel hidden" aria-label="가방">
        <div class="inventory-title">가방</div>
        <div id="inventoryItems" class="inventory-items"></div>
        <div class="inventory-help">아이템을 눌러 선택해 보세요</div>
      </section>
      <div id="dialogue" class="dialogue hidden"></div>
      <div id="hint" class="hint hidden"></div>
      <div id="joystick" class="joystick hidden" aria-label="이동 조이스틱">
        <div class="joystick-ring"></div>
        <div id="joystickKnob" class="joystick-knob"></div>
      </div>
    </div>
  </main>
  <script src="script_v11_restore.js?v=55"></script>
  <script src="leg_extension_patch.js?v=14"></script>
  <script src="foamroller_patch.js?v=7"></script>
  <script src="dumbbell_rack_patch.js?v=3"></script>
  <script src="ui_icons_patch.js?v=2"></script>
  <script src="gym_scenario_patch.js?v=7"></script>
  <script src="gym_fix_patch.js?v=1"></script>
  <script src="black_roller_resize_patch.js?v=2"></script>
  <script src="dialogue_speaker_patch.js?v=3"></script>
  <script src="inventory_gift_fix_patch.js?v=1"></script>
</body>
</html>
