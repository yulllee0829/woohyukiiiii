<body>
  <main id="app">
    <canvas id="game" width="384" height="672" aria-label="500일 꿈속 호텔 픽셀 게임"></canvas>
    <div id="ui">
      <button id="startButton" class="pixel-button">호텔 들어가기</button>
      <button id="pocketButton" class="pocket-button hidden" aria-label="가방 열기"></button>
      <button id="actionButton" class="action-button hidden" aria-label="상호작용하기"></button>
      <section id="inventoryPanel" class="inventory-panel hidden" aria-label="가방">
        <div class="inventory-title">가방</div>
        <div id="inventoryItems" class="inventory-items"></div>
        <div class="inventory-help">아이템을 눌러 선택해 보세요</div>
      </section>
      <div id="dialogue" class="dialogue hidden"></div>
      <div id="hint" class="hint hidden"></div>
      <div id="joystick" class="joystick hidden" aria-label="이동 조이스틱">
        <div class="joystick-ring"></div>
        <div id="joystickKnob" class="joystick-knob"></div>
      </div>
    </div>
  </main>
