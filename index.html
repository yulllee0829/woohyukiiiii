<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#17172a" />
  <title>500일 꿈속 호텔</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <canvas id="game" width="384" height="672" aria-label="500일 꿈속 호텔 픽셀 게임"></canvas>
    <div id="ui">
      <button id="startButton" class="pixel-button">호텔 들어가기</button>
      <button id="actionButton" class="pixel-button hidden">확인</button>
      <div id="dialogue" class="dialogue hidden"></div>
      <div id="hint" class="hint hidden"></div>
      <div id="controls" class="controls hidden" aria-label="이동 조작">
        <button data-dir="left">◀</button>
        <button data-dir="up">▲</button>
        <button data-dir="down">▼</button>
        <button data-dir="right">▶</button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
